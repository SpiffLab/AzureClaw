name: bicep-what-if

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/bicep-what-if.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

# This workflow runs `az deployment sub what-if` against the dev subscription
# on every PR that touches `infra/`. It DOES NOT deploy anything — it only
# previews the change set and posts the diff as a PR comment.
#
# As of the `azure-infra-bootstrap` change, `infra/main.bicep` is guaranteed
# to exist on every commit on `main`, so the previous "skip when the entry
# point does not exist" branch has been removed. The `noop` job remains for
# the case where `AZURE_DEV_SUBSCRIPTION_ID` is not configured (e.g., for
# external contributors who do not have access to the dev subscription).

jobs:
  what-if:
    name: ci/bicep-what-if
    runs-on: ubuntu-latest
    if: ${{ vars.AZURE_DEV_SUBSCRIPTION_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (federated)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_DEV_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_DEV_SUBSCRIPTION_ID }}

      - name: Run what-if
        id: whatif
        run: |
          set -euo pipefail
          az deployment sub what-if \
            --location ${{ vars.AZURE_DEV_LOCATION }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters.dev.bicepparam \
            > whatif.txt

      - name: Comment what-if on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = '## Bicep what-if (dev subscription)\n\n```\n' +
                         fs.readFileSync('whatif.txt', 'utf8') +
                         '\n```';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  noop:
    name: ci/bicep-what-if
    runs-on: ubuntu-latest
    if: ${{ vars.AZURE_DEV_SUBSCRIPTION_ID == '' }}
    steps:
      - run: |
          echo "Azure dev subscription is not configured — what-if is a no-op."
          echo "Configure the AZURE_DEV_SUBSCRIPTION_ID, AZURE_DEV_CLIENT_ID,"
          echo "AZURE_TENANT_ID, and AZURE_DEV_LOCATION repository variables to enable."
