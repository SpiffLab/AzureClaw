name: bicep-what-if

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/bicep-what-if.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

# This workflow runs `az deployment sub what-if` against the dev subscription
# on every PR that touches `infra/`. It DOES NOT deploy anything — it only
# previews the change set and posts the diff as a PR comment.
#
# It is intentionally optional until `azure-infra-bootstrap` lands the first
# Bicep modules and the dev subscription has been wired up via federated
# credentials. Until then the job is a no-op so PRs from contributors without
# Azure access are not blocked.

jobs:
  what-if:
    name: ci/bicep-what-if
    runs-on: ubuntu-latest
    if: ${{ vars.AZURE_DEV_SUBSCRIPTION_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (federated)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_DEV_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_DEV_SUBSCRIPTION_ID }}

      - name: Run what-if
        id: whatif
        run: |
          set -euo pipefail
          if [ ! -f infra/main.bicep ]; then
            echo "infra/main.bicep does not exist yet — skipping what-if."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          az deployment sub what-if \
            --location ${{ vars.AZURE_DEV_LOCATION }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters.dev.bicepparam \
            > whatif.txt
          echo "skipped=false" >> "$GITHUB_OUTPUT"

      - name: Comment what-if on PR
        if: steps.whatif.outputs.skipped == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = '## Bicep what-if (dev subscription)\n\n```\n' +
                         fs.readFileSync('whatif.txt', 'utf8') +
                         '\n```';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  noop:
    name: ci/bicep-what-if
    runs-on: ubuntu-latest
    if: ${{ vars.AZURE_DEV_SUBSCRIPTION_ID == '' }}
    steps:
      - run: |
          echo "Azure dev subscription is not configured — what-if is a no-op."
          echo "Configure the AZURE_DEV_SUBSCRIPTION_ID, AZURE_DEV_CLIENT_ID,"
          echo "AZURE_TENANT_ID, and AZURE_DEV_LOCATION repository variables to enable."
